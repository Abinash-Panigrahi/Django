<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>

    <div class="container">
        <nav class="navbar bg-body-tertiary">
            <form class="container-fluid justify-content-start">
                <h2 ><i style="text-shadow: 4px 6px 6px;">My auth app</i></h2>
              <div class="btn ps-5">
                <a href="{% url 'signup' %}">
                    <button class="btn btn-outline-success me-3" type="button" style="padding-left: 20px;">Sign up</button>
                </a>
                <a href="{% url 'signin' %}">
                    <button class="btn btn-sm btn-outline-secondary" type="button" style="padding-left: 20px;">Sign in</button>
                </a>
              </div>
            </form>
          </nav>
    </div>

    <div class="container text-center">
        <h2>Welcome to My auth app</h2>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
