<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>


    <div class="container">
      <h1 class="text-center">Update Task</h1>
      <div class="card mx-auto" style="width:50%;">
        <h5 class="card-header bg-primary text-white">Update your task</h5>
        <div class="card-body">
          <form action="{% url 'update' record.id %}" method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label for="addtask" class="form-label">Enter your task details</label>
              <input type="text" class="form-control" id="addtask" name='update_task' value="{{ record.task_name }}">
            </div>
            <button type="reset" class="btn btn-dark btn-sm">reset</button>
            <button type="submit" class="btn btn-success btn-sm">Update</button> <br>
            <a href="{% url 'home' %}">Back</a>
          </form>
        </div>
      </div>
    </div>


      
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
