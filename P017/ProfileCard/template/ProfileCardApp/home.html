<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body style="background-image: linear-gradient(lightgreen,white,lightblue);">

    <div class="container">
    <h1 style="text-align: center; font-size: 90px; padding-right: 100px; color: black">Details about some actors</h1>
    <div class="row">
    {% for i in all_records %}
    <div class="col-md-4 mb-4">
    <div class="card" style="width: 18rem;">
        <img src="{{ i.profile_pic.url }}" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-title"> About </h5>
          <h5 class="card-title">Name : {{i.name}} </h5>
          <p class="card-text">Course : {{i.course}} </p>
          <p class="card-text">E_mail : {{i.email}} </p>

          <a href="{% url 'about' i.id %}" class="btn btn-primary">Go somewhere</a>
        </div>
      </div>
      </div>
      {% endfor %}
      </div>
      </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
