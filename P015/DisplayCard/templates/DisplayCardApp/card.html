<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>
    <div class="card text-bg-primary mb-3" style="max-width: 30rem;" >
        <div class="card-header text-center">Name : {{record.name}} </div>
        <div class="card-body" style="padding-left: 180px;">
            <p class="card-text">ID : {{record.id}}  </p>
            <p class="card-text">Course : {{record.course}} </p>
            <p class="card-text">Mark : {{record.mark}} </p>
            <p class="card-text">E_mail : {{record.e_mail}} </p>  
            <a href="{% url 'all_records' %}" style="color: black;">Go Back</a>
        </div>
      </div>
      </div>
</body>
</html>
